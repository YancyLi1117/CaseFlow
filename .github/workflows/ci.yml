name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:6543/caseflow?pgbouncer=true&connection_limit=1&sslmode=require
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/caseflow?sslmode=require

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Next types
        run: npx next typegen

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx next build --webpack
